name: Sanitize

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-no-personal-strings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject personal / project-specific strings in tracked files
        run: |
          set -e
          # Strings that must never appear in the distributed package.
          # Allowed file: .mailmap (which intentionally maps the historical
          # email to the alias for display purposes).
          PATTERN='winsmux|komei1118|MainVault|X-Radar|AI-News'
          MATCHES=$(git ls-files \
            | grep -v -E '^\.mailmap$' \
            | xargs -I{} grep -lE "$PATTERN" "{}" 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Personal or project-specific strings detected in tracked files:"
            echo "$MATCHES"
            for f in $MATCHES; do
              echo "--- $f ---"
              grep -nE "$PATTERN" "$f" || true
            done
            exit 1
          fi
          echo "Sanitize check passed: no personal / project-specific strings detected."
